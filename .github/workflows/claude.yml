name: Claude Code (reusable)

# Derived from vendor/anthropics-claude-code-action/examples-claude.yml.
# When sync-upstream.yml opens a PR against the vendored copy, port the
# relevant diff into this file by hand — trigger/permissions/prompt
# conventions, not just the action version.
#
# Routed through our private prism gateway (GLM/Kimi/DeepSeek behind
# ai.celados.com), not the official Anthropic API — see celados/prism and its
# docs/deployment-ops1.md runbook. PRISM_API_KEY / PRISM_ANTHROPIC_BASE_URL
# are org-level secret/variable on celados.

on:
  workflow_call:
    secrets:
      PRISM_API_KEY:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # permissions are granted by the caller workflow (see templates/agents.yml)
    env:
      ANTHROPIC_BASE_URL: ${{ vars.PRISM_ANTHROPIC_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.PRISM_API_KEY }}
